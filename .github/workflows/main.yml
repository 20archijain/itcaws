name: Auto Deploy Angular

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest  

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: itcph2/package-lock.json

      - name: Install Node Dependencies
        working-directory: itcph2
        run: npm ci  

      - name: Install Composer Dependencies
        working-directory: itcph2
        run: |
          composer install --no-dev --optimize-autoloader

      - name: Run Lint
        working-directory: itcph2
        run: npm run lint

      - name: Build Angular App
        working-directory: itcph2
        run: npm run build -- --configuration production

      # ✅ Debug step - shows you the EXACT output folder name
      - name: Show Build Output
        run: ls -la itcph2/dist/

      - name: Deploy to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          local-dir: ./itcph2/dist/browser/   # ⚠️ Verify this matches 'ls' output above
          server-dir: /public_html/
          dangerous-clean-slate: true          # ✅ KEY FIX: Ignores stale cache, force re-uploads all files
