<app-modal #locationOnMapModal [containerClick]="false" dialogClass="modal-lg">
  <div class="app-modal-header">
    <h3 class="modal-title">
      {{ 'icon.map' | translate }}
    </h3>
  </div>
  <div class="app-modal-body">
    <app-simple-map [markers]="markers" [defaultZoom]="defaultZoom"></app-simple-map>
  </div>
  <div class="app-modal-footer btn-page">
    <button type="button" (click)="onClick()" data-dismiss="modal" class="btn btn-primary text-white">
      {{ 'button.close' | translate }}</button>
  </div>
</app-modal>
