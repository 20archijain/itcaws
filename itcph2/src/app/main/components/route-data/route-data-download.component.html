<app-card cardTitle="{{ 'app.routeData.downloadHeading' | translate }}" [options]="false">
  <form (ngSubmit)="downloadData()" [formGroup]="group" novalidate>
    <!-- Admin and Superadmin login  -->
    <div *ngIf="branchFilter" class="row ml-1 filter-container">
      <div class="w-2 m-1">
        <app-select [group]="group" controlName="district" [options]="districtOptions" [multiple]="true"
          placeholder="{{ 'app.team.add.district' | translate }}" (onChange)="getBranch()" label="app.team.add.district"
          (onChange)="getBranch()">
        </app-select>
      </div>
      <div class="w-2 m-1">
        <app-select [group]="group" controlName="branch" placeholder="{{ 'app.team.add.branch' | translate }}"
          label="app.team.add.branch" [options]="branchOptions" [errorMessages]="errorMessages.branch"
          (onChange)="getCircle()" [isRequired]="isBranchRequired" multiple="true" groupBy="mainBranch">
        </app-select>
      </div>
      <div class="w-2 m-1">
        <app-select [group]="group" controlName="circle" [options]="circleOptions" [multiple]="true"
          placeholder="{{ 'app.team.add.circle' | translate }}" (onChange)="getSection()" label="app.team.add.circle">
        </app-select>
      </div>
      <div class="w-2 m-1">
        <app-select [group]="group" controlName="section" [options]="sectionOptions" [multiple]="true"
          placeholder="{{ 'app.team.add.section' | translate }}" (onChange)="getWDCode()" label="app.team.add.section">
        </app-select>
      </div>
      <div class="w-2 m-1">
        <app-select [group]="group" controlName="wdCode" [options]="wdCodeOptions"
          placeholder="{{ 'app.team.add.wdCode' | translate }}" (onChange)="getTeamsType()" [multiple]="true"
          label="app.team.add.wdCode">
        </app-select>
      </div>
      <div class="w-2 m-1">
        <app-select [group]="group" controlName="wdMarket" [options]="wdMarketOptions" [multiple]="true"
          placeholder="{{ 'app.wdMapping.wd_market' | translate }}" label="app.wdMapping.wd_market">
        </app-select>
      </div>
      <div class="w-2 m-1">
        <app-select [group]="group" controlName="wdPopGroup" [options]="wdPopGroupOptions" [multiple]="true"
          placeholder="{{ 'app.wdMapping.wd_pop_group' | translate }}" label="app.wdMapping.wd_pop_group">
        </app-select>
      </div>
      <div class="w-2 m-1">
        <app-select [group]="group" controlName="dsType" placeholder="{{ 'app.team.add.dsType' | translate }}"
          label="app.team.add.dsType" [options]="teamTypeOptions" (onChange)="getTeamsName()" [multiple]="true">
        </app-select>
      </div>

      <div class="w-2 m-1">
        <app-select [group]="group" controlName="dsName" placeholder="{{ 'app.team.add.dsName' | translate }}"
          label="app.team.add.dsName" [options]="teamOptions" [errorMessages]="errorMessages.team" [multiple]="true">
        </app-select>
      </div>
      <div class="col-sm-4 col-md-2">
        <app-button type="submit" text="button.download" [appScrollToFirstInvalidInput]="group" btnClass="m-t-30"
          [isDisabled]="isDownloading">
        </app-button>
      </div>
    </div>
