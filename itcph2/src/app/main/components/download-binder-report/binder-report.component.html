<app-card cardTitle="{{ 'app.download.downloadBinderReport' | translate }}" [options]="false">
  <form (ngSubmit)="download()" [formGroup]="group" novalidate class="form-content">
    <!-- Superadmin and Admin Login -->
    <div *ngIf="branchFilter" class="row ml-1 filter-container">
      <div class="w-2 m-1">
        <app-date label="placeholder.from" placeholder="{{ 'placeholder.from' | translate }}" [group]="group"
          controlName="dateFrom" [errorMessages]="errorMessages.dateFrom" [isRequired]="true"
          [maxDate]="group.get('dateTo').value">
        </app-date>
      </div>
      <div class="w-2 m-1">
        <app-date label="placeholder.to" placeholder="{{ 'placeholder.to' | translate }}" [group]="group"
          controlName="dateTo" [errorMessages]="errorMessages.dateTo" [isRequired]="true"
          [minDate]="group.get('dateFrom').value">
        </app-date>
      </div>
      <div class="w-2 m-1">
        <app-select [group]="group" controlName="branch" [options]="branchOptions" [multiple]="true"
          label="app.team.add.branch" placeholder="{{ 'app.team.add.branch' | translate }}" (onChange)="getCircle()"
          [errorMessages]="errorMessages.branch" groupBy="mainBranch">
        </app-select>
      </div>
      <div *ngIf="branchFilter" class="w-2 m-1">
        <app-select [group]="group" controlName="circle" [options]="circleOptions" [multiple]="true"
          label="app.team.add.circle" placeholder="{{ 'app.team.add.circle' | translate }}" (onChange)="getSection()">
        </app-select>
      </div>
      <div *ngIf="branchFilter" class="w-2 m-1">
        <app-select [group]="group" controlName="section" [options]="sectionOptions" [multiple]="true"
          label="app.team.add.section" placeholder="{{ 'app.team.add.section' | translate }}" (onChange)="getWDCode()">
        </app-select>
      </div>
      <div class="w-2 m-1">
        <app-select [group]="group" controlName="wdCode" [options]="wdCodeOptions" [multiple]="true"
          label="app.team.add.wdCode" placeholder="{{ 'app.team.add.wdCode' | translate }}" (onChange)="getTeamsType()">
        </app-select>
      </div>
      <div class="w-2 m-1">
        <app-select [group]="group" controlName="dsType" [options]="teamTypeOptions" label="app.team.add.dsType"
          placeholder="{{ 'app.team.add.dsType' | translate }}" (onChange)="getTeams()">
        </app-select>
      </div>
      <div class="w-2 m-1">
        <app-select [group]="group" controlName="dsName" [options]="teamOptions" [multiple]="true"
          label="app.team.add.dsName" placeholder="{{ 'app.team.add.dsName' | translate }}">
        </app-select>
      </div>
      <div class="col-sm-1 m-1">
        <app-button [isFaIcon]="true" iconName="fa fa-file-excel" [showIconInButton]="true" btnTitle="button.download"
          [isDisabled]="isDisabled" [appScrollToFirstInvalidInput]="group" btnClass="m-t-30" (onClick)="download()">
        </app-button>
      </div>
    </div>

    <!-- Regional Login -->
    <div *ngIf="!branchFilter" class="row ml-1 filter-container">
      <div class="w-2 m-1">
        <app-select [group]="group" controlName="wdCode" [options]="wdCodeOptions" [multiple]="true"
          label="app.team.add.wdCode" placeholder="{{ 'app.team.add.wdCode' | translate }}" (onChange)="getTeamsType()">
        </app-select>
      </div>
      <div class="w-2">
        <app-select [group]="group" controlName="dsType" [options]="teamTypeOptions" label="app.team.add.dsType"
          placeholder="{{ 'app.team.add.dsType' | translate }}" (onChange)="getTeams()">
        </app-select>
      </div>
      <div class="w-2 m-1">
        <app-select [group]="group" controlName="dsName" [options]="teamOptions" [multiple]="true"
          label="app.team.add.dsName" placeholder="{{ 'app.team.add.dsName' | translate }}">
        </app-select>
      </div>
      <div class="m-1">
        <app-button [isFaIcon]="true" iconName="fa fa-file-excel" [showIconInButton]="true" btnClass="m-t-30"
          btnTitle="button.download" [isDisabled]="isDisabled" [appScrollToFirstInvalidInput]="group" btnClass="m-t-30"
          (onClick)="download()">
        </app-button>
      </div>
    </div>

    <!-- Footer Section with Buttons -->

  </form>
</app-card>
