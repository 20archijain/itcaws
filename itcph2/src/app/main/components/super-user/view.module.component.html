<app-card cardTitle="{{ 'app.user.module.view.heading' | translate }}" [options]="false">
  <app-table-listing checkKey="id" [header]="header" [url]="url" [body]="body" [sortOptions]="sortOptions"
    editLabel="app.user.module.view.editHeading" [editConfig]="editConfig" [searchTemplate]="searchTemplate"
    [searchGroup]="form" [smallTable]="false">
  </app-table-listing>
</app-card>

<ng-template #searchTemplate>
  <div class="row">
    <div class="col-sm-4 col-md-3 col-xl-2">
      <app-input placeholder="{{ 'app.user.module.add.moduleName' | translate }}" [group]="form" controlName="name">
      </app-input>
    </div>
    <div class="col-sm-4 col-md-3 col-xl-2">
      <app-input placeholder="{{ 'app.user.module.add.moduleCode' | translate }}" [group]="form"
        controlName="moduleCode"></app-input>
    </div>
    <div class="col-sm-4 col-md-3">
      <app-input placeholder="{{ 'app.user.module.add.moduleComponent' | translate }}" [group]="form"
        controlName="moduleComponent"></app-input>
    </div>
    <div class="col-sm-4 col-md-3">
      <app-input placeholder="{{ 'app.user.module.add.moduleUrl' | translate }}" [group]="form" controlName="moduleUrl">
      </app-input>
    </div>
    <div class="col-sm-3 col-md-2">
      <app-button type="submit" text="button.search"></app-button>
    </div>
  </div>
</ng-template>
